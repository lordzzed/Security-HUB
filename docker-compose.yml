version: '3.8'

volumes:
  n8n_data:
  ollama_data:

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_hub
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./relatorios:/home/node/relatorios
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/relatorios

  ollama:
    image: ollama/ollama
    container_name: ollama_hub
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
